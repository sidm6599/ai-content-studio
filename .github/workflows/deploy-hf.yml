# ─────────────────────────────────────────────────────────────────────────────
# Deploy to Hugging Face Spaces (Streamlit SDK)
#
# ONE-TIME SETUP:
#   1. Create a Hugging Face *Streamlit* Space named "ai-content-studio".
#   2. GitHub repo → Settings → Secrets and variables → Actions → add a secret
#      HF_TOKEN  (a HF *write* token from https://huggingface.co/settings/tokens).
#   3. In the HF Space → Settings → Variables and secrets, add NVIDIA_API_KEY
#      (and optionally SUPABASE_URL / SUPABASE_KEY / GEMINI_API_KEY).
#
# Until HF_TOKEN is set, the deploy step is SKIPPED and this workflow stays green.
# Trigger manually from the Actions tab (workflow_dispatch) or on push to main.
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy to Hugging Face Spaces

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # secrets can't be used in `if:` directly, so route HF_TOKEN through env.
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      HF_USERNAME: sidmishra6895
      HF_SPACE: ai-content-studio
    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Hugging Face Space
        # Runs only once HF_TOKEN has been configured as a repo secret.
        if: ${{ env.HF_TOKEN != '' }}
        run: |
          # Force-push the repo to the Space, overwriting HF's default template.
          git push --force \
            "https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE}.git" \
            HEAD:main
