# ─────────────────────────────────────────────────────────────────────────────
# Deploy to Hugging Face Spaces
#
# ONE-TIME SETUP (do this before the first push to main):
#   1. Create a Hugging Face Space at https://huggingface.co/new-space
#      and choose "Streamlit" as the SDK.
#   2. Go to your GitHub repo → Settings → Secrets and variables → Actions
#      and add a Repository Secret named HF_TOKEN (your HF write-access token,
#      obtained from https://huggingface.co/settings/tokens).
#   3. Set HF_USERNAME and HF_SPACE below to match your Space (or promote them
#      to GitHub Repository Variables so you can change them without editing YAML).
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy to Hugging Face Spaces

on:
  push:
    branches:
      - main

# ── CONFIGURE THESE TWO VALUES ────────────────────────────────────────────────
env:
  HF_USERNAME: YOUR_HF_USERNAME   # e.g. siddhesh
  HF_SPACE: YOUR_HF_SPACE_NAME    # e.g. ai-content-studio
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Only runs when the HF_TOKEN secret has been configured
    if: ${{ secrets.HF_TOKEN != '' }}

    steps:
      - name: Checkout repository (full history for git push)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push \
            "https://${{ env.HF_USERNAME }}:${HF_TOKEN}@huggingface.co/spaces/${{ env.HF_USERNAME }}/${{ env.HF_SPACE }}" \
            main
