# ─────────────────────────────────────────────────────────────────────────────
# Deploy to Hugging Face Spaces
#
# ONE-TIME SETUP (do this before the first push to main):
#   1. Create a Hugging Face Space at https://huggingface.co/new-space
#      and choose "Streamlit" as the SDK.
#   2. GitHub repo → Settings → Secrets and variables → Actions → New repository
#      secret named HF_TOKEN (a HF write token from
#      https://huggingface.co/settings/tokens).
#   3. Set HF_USERNAME below to your Hugging Face username (HF_SPACE is pre-filled).
#
# Until HF_TOKEN is set, the deploy step is SKIPPED and this workflow stays green.
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy to Hugging Face Spaces

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # secrets can't be used in `if:` directly, so route HF_TOKEN through env.
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      HF_USERNAME: YOUR_HF_USERNAME   # <-- set to your Hugging Face username
      HF_SPACE: ai-content-studio     # pre-filled to match the repo
    steps:
      - name: Checkout repository (full history for git push)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Hugging Face Space
        # Runs only once HF_TOKEN has been configured as a repo secret.
        if: ${{ env.HF_TOKEN != '' }}
        run: |
          git push \
            "https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE}" \
            main
